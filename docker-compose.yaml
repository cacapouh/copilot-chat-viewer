services:
  viewer:
    build: .
    image: copilot-chat-viewer:dev
    container_name: copilot-chat-viewer
    ports:
      - "5173:5173"
    volumes:
      # ホスト側で編集 → コンテナの Vite が即反映するため bind mount。
      # node_modules はコンテナ側のものを使うので named volume で隠す。
      - ./:/app
      - node_modules:/app/node_modules
      # ショートリンクの保存先。urls.json を直接編集できるよう bind mount。
      - ./data:/app/data
    environment:
      - CHOKIDAR_USEPOLLING=true
      - DATA_DIR=/app/data
    command: ["npm", "run", "dev"]
    stdin_open: true
    tty: true

volumes:
  node_modules:
